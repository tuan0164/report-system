server {
    listen 80;
    server_name _;

    # Static frontend (SPA)
    root /usr/share/nginx/html;
    index index.html;

    # React Router: mọi path không phải file thật -> trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API sang backend container.
    # Trailing slash "/" ở proxy_pass => cắt tiền tố /api trước khi chuyển.
    #   FE gọi  /api/auth/google   -> backend nhận /auth/google
    #   FE gọi  /api/users/me      -> backend nhận /users/me
    # => FE đặt VITE_API_URL = "/api"
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # (tùy chọn) cache asset tĩnh
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
